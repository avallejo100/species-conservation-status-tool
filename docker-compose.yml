---
services:
    app:
        build: .
        container_name: species-conservation-tool
        ports:
            - "8050:8050"
        volumes:
            - .:/app
        depends_on:
            - redis-db
        environment:
            - REDIS_HOST=redis-db
    redis-db:
        image: redis:8.6.0
        container_name: redis
        ports:
            - "6379:6379"
        volumes:
            - ./redis-data:/data
        user: "1000:1000"
        command: redis-server --appendonly yes --appendfsync everysec